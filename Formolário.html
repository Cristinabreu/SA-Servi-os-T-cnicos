    <article class="formulario-article">
    <h2 class="titulo-formulario"> Formulário de Solicitação de Orçamento</h2>
    <div class="form-container">
        <form action="" method="get" enctype="multipart/form-data" class="formulario">
           
            <label for="nome">Nome:</label>
            <input type="text" placeholder="Nome e sobrenome Ex.: Ricardo Reis" id="nome" name="nome" required><br><br>

            <label for="complete_address">Endreço da obra:</label>
            <textarea id="complete_address" placeholder="Endreço completo da obra " name="complete_address" rows="4"
                cols="50"></textarea><br><br>

            <label for="telefone">Telefone:</label>
            <input type="tel" placeholder="+55 44 994132-XXXX." id="telefone" name="telefone" required><br><br>

            <label for="">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="descricao">Descrição do Serviço Predial:</label><br>
            <textarea id="descricao" placeholder="Descreve o serviço a ser realizado" name="descricao" rows="4"
                cols="50" required></textarea><br><br>

            <label for="arquivos">Entroduza os seus arquivos</label>
            <input type="file" class="arquivos" name="arquivo" multiple><br><br>

            <input type="submit" value="Enviar Solicitação">
        </form>
    </div>
